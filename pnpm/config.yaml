# ============================================================
# pnpm グローバルセキュリティ設定 (Harness Engineering)
#
# 目的: 生成AI由来のスクリプトや不審なパッケージによる
#       OS環境の汚染・マルウェア実行をデフォルトで防ぐ (Fail-Safe)
# ============================================================

# ------------------------------------------------------------
# 1. 依存関係の厳格化 (ファントム依存の防止)
#
# package.json に明記していないパッケージの import をエラーにする。
# 「ローカルでは動くが他所では動かない」問題や、暗黙の依存を
# 利用した攻撃を防ぐ。
# ------------------------------------------------------------
hoist=false
shamefully-hoist=false
public-hoist-pattern=

# ------------------------------------------------------------
# 2. ストアの完全性担保 (キャッシュポイズニング対策)
#
# ローカルの pnpm ストアからパッケージを読み出す際、常にハッシュを検証。
# 万が一ローカルのキャッシュファイルが改ざんされても実行を防ぐ。
# ------------------------------------------------------------
verify-store-integrity=true

# ------------------------------------------------------------
# 3. 不審な経路の遮断
#
# 依存先のパッケージが、公式の npm レジストリを通さずに直接 GitHub の
# URL や tarball リンクから別パッケージを裏口ダウンロードするのを防ぐ。
# ------------------------------------------------------------
block-exotic-subdeps=true

# ------------------------------------------------------------
# 4. 新規公開パッケージの検疫期間 (タイポスクワッティング/乗っ取り対策)
#
# npm に公開されてから「7日間 (10080分)」経過していない最新版は弾く。
# 悪意あるパッケージが公開されても、コミュニティによって検知・削除される
# までの猶予を持たせるための強力な防波堤。
# (※最新機能をすぐ使いたい場合は、各プロジェクトの .npmrc で
#   minimum-release-age=0 に上書きして回避する)
# ------------------------------------------------------------
minimum-release-age=10080
minimum-release-age-strict=true

# ------------------------------------------------------------
# 5. 信頼レベルの降格防止 (ダウングレード攻撃対策)
#
# 過去のバージョンでは署名 (provenance) が付いていたのに、
# 新しいバージョンで突然署名がなくなった場合などにインストールを拒否する。
# 作者アカウントの乗っ取り等による不正公開を検知する。
# ------------------------------------------------------------
trust-policy=no-downgrade

# ------------------------------------------------------------
# 6. postinstall スクリプトの完全ブロック (マルウェア実行防止)
#
# パッケージインストール時に裏で勝手に走るスクリプトをグローバルで全拒否。
# npm を狙ったマルウェアの大半はこの仕組みを悪用するため、最も重要な防御壁。
# (※esbuild や sharp 等のバイナリコンパイルが本当に必要な場合は、
#   各プロジェクトの .npmrc で allow-builds に明示的に許可リストを入れる)
# ------------------------------------------------------------
allow-builds=