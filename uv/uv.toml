# ============================================================
# uv グローバルセキュリティ設定 (Harness Engineering)
#
# 目的: サプライチェーン攻撃をデフォルトで防ぐ (Fail-Safe)
# 配置: ~/.config/uv/uv.toml (symlink from dotfiles)
# ============================================================

# ------------------------------------------------------------
# 1. 新規公開パッケージの検疫期間 (タイポスクワッティング/乗っ取り対策)
#
# PyPI に公開されてから 7日間 経過していない版は弾く。
# 悪意あるパッケージが公開されても、コミュニティによって
# 検知・削除されるまでの猶予を持たせる最重要の防波堤。
#
# pnpm の minimum-release-age=10080 に相当。
#
# ※ 各プロジェクトの uv.toml で exclude-newer を上書きすれば
#   プロジェクト単位で解除できる（グローバル設定より優先される）。
# ------------------------------------------------------------
exclude-newer = "7 days"

# ------------------------------------------------------------
# 2. 公式レジストリのみ使用 (裏口ダウンロード遮断)
#
# PyPI 公式以外のインデックスからのインストールを禁止する。
# 依存パッケージが非公式経路でマルウェアを引き込むのを防ぐ。
#
# pnpm の block-exotic-subdeps=true に相当。
#
# ※ プライベートレジストリが必要なプロジェクトでは
#   プロジェクトの uv.toml で [[index]] を追加して上書きする。
# ------------------------------------------------------------
[[index]]
url = "https://pypi.org/simple"
default = true